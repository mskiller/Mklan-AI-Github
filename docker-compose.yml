services:
  backend:
    build:
      context: ./backend
      dockerfile: ${BACKEND_DOCKERFILE:-Dockerfile}
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./backend/app:/app/app:ro
      - sillytavern_data:/sillytavern-data
    environment:
      - ENVIRONMENT=production
      # Wildcard defaults
      - WILDCARD_SOURCE_ROOT=/app/data/wildcards
      - WILDCARD_WORKSHOP_DATA_DIR=/app/data/wildcards
      - WILDCARD_WORKSHOP_DB=/app/data/wildcards/wildcard_workshop.db
      - WILDCARD_EXPORT_ROOT=/app/data/exports
      # Movie defaults
      - MOVIE_DATA_DIR=/app/data/movie
      - MOVIE_DB=/app/data/movie/movie_tool.db
      - MOVIE_TOOL_SCENARIO_ASSISTANT_PROVIDER=${MOVIE_TOOL_SCENARIO_ASSISTANT_PROVIDER:-koboldcpp}
      - MOVIE_TOOL_SCENARIO_ASSISTANT_BASE_URL=${MOVIE_TOOL_SCENARIO_ASSISTANT_BASE_URL:-http://host.docker.internal:5001/v1}
      - MOVIE_TOOL_SCENARIO_ASSISTANT_MODEL=${MOVIE_TOOL_SCENARIO_ASSISTANT_MODEL:-koboldcpp}
      - MOVIE_TOOL_IMAGE_MODEL_ROOT=${MOVIE_TOOL_IMAGE_MODEL_ROOT:-/app/data/models/images}
      - MOVIE_TOOL_IMAGE_PROVIDER=${MOVIE_TOOL_IMAGE_PROVIDER:-comfyui}
      - MOVIE_TOOL_IMAGE_DEFAULT_MODEL=${MOVIE_TOOL_IMAGE_DEFAULT_MODEL:-}
      - MOVIE_TOOL_COMFY_ENDPOINT=${MOVIE_TOOL_COMFY_ENDPOINT:-http://host.docker.internal:8188}
      - MOVIE_TOOL_COMFY_TIMEOUT_S=${MOVIE_TOOL_COMFY_TIMEOUT_S:-300}
      - MOVIE_TOOL_IMAGE_SAMPLER=${MOVIE_TOOL_IMAGE_SAMPLER:-LCM}
      - MOVIE_TOOL_IMAGE_SCHEDULER=${MOVIE_TOOL_IMAGE_SCHEDULER:-simple}
      - MOVIE_TOOL_IMAGE_STEPS=${MOVIE_TOOL_IMAGE_STEPS:-12}
      - MOVIE_TOOL_IMAGE_CFG_SCALE=${MOVIE_TOOL_IMAGE_CFG_SCALE:-1}
      # Studio features data root (models, generated images, settings)
      - STUDIO_DATA_ROOT=/app/data
      - STUDIO_CORS_ORIGINS=${STUDIO_CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      - STUDIO_API_KEY=${STUDIO_API_KEY:-}
      - STUDIO_MODEL_UPLOAD_MAX_BYTES=${STUDIO_MODEL_UPLOAD_MAX_BYTES:-34359738368}
      - STUDIO_IMAGE_UPLOAD_MAX_BYTES=${STUDIO_IMAGE_UPLOAD_MAX_BYTES:-104857600}
      - STUDIO_DATASET_ZIP_MAX_BYTES=${STUDIO_DATASET_ZIP_MAX_BYTES:-2147483648}
      - STUDIO_TRAINING_DRY_RUN=${STUDIO_TRAINING_DRY_RUN:-true}
      - STUDIO_SD_SCRIPTS_ROOT=${STUDIO_SD_SCRIPTS_ROOT:-/app/trainers/sd-scripts}
      - STUDIO_ACCELERATE_BIN=${STUDIO_ACCELERATE_BIN:-accelerate}
      - STUDIO_Z_IMAGE_TRAIN_SCRIPT=${STUDIO_Z_IMAGE_TRAIN_SCRIPT:-}
      - STUDIO_CAPTION_MODEL_ID=${STUDIO_CAPTION_MODEL_ID:-Salesforce/blip-image-captioning-base}
      - STUDIO_CAPTION_ALLOW_DOWNLOAD=${STUDIO_CAPTION_ALLOW_DOWNLOAD:-false}
      - STUDIO_DISABLE_LOCAL_CAPTIONING=${STUDIO_DISABLE_LOCAL_CAPTIONING:-false}
      - STUDIO_CAPTION_PROVIDER=${STUDIO_CAPTION_PROVIDER:-auto}
      - STUDIO_CAPTION_CLIP_MODEL_ID=${STUDIO_CAPTION_CLIP_MODEL_ID:-OysterQAQ/DanbooruCLIP}
      - STUDIO_CAPTION_CLIP_MODEL_SOURCE=${STUDIO_CAPTION_CLIP_MODEL_SOURCE:-auto}
      - STUDIO_CAPTION_CLIP_ALLOW_DOWNLOAD=${STUDIO_CAPTION_CLIP_ALLOW_DOWNLOAD:-false}
      - STUDIO_CAPTION_CLIP_CACHE_DIR=${STUDIO_CAPTION_CLIP_CACHE_DIR:-/app/data/models/captioning/hf-cache}
      - STUDIO_CAPTION_CLIP_TAGS_PATH=${STUDIO_CAPTION_CLIP_TAGS_PATH:-/app/data/models/captioning/tag_vocab/default_tags.txt}
      - STUDIO_CAPTION_CLIP_TOP_K=${STUDIO_CAPTION_CLIP_TOP_K:-24}
      - STUDIO_CAPTION_CLIP_THRESHOLD=${STUDIO_CAPTION_CLIP_THRESHOLD:-0}
      - STUDIO_CAPTION_CLIP_MAX_CANDIDATES=${STUDIO_CAPTION_CLIP_MAX_CANDIDATES:-256}
      - STUDIO_CAPTION_CLIP_PROMPT_TEMPLATE=${STUDIO_CAPTION_CLIP_PROMPT_TEMPLATE:-{tag}}
      - STUDIO_CAPTION_VLM_ENDPOINT=${STUDIO_CAPTION_VLM_ENDPOINT:-}
      - STUDIO_CAPTION_VLM_MODEL=${STUDIO_CAPTION_VLM_MODEL:-}
      - STUDIO_CAPTION_VLM_API_KEY=${STUDIO_CAPTION_VLM_API_KEY:-}
      - STUDIO_CAPTION_VLM_TIMEOUT_S=${STUDIO_CAPTION_VLM_TIMEOUT_S:-120}
      - STUDIO_CAPTION_VLM_PROMPT=${STUDIO_CAPTION_VLM_PROMPT:-}
      - MEDIA_INDEXER_INTERNAL_URL=${MEDIA_INDEXER_INTERNAL_URL:-http://media_indexer_backend:8000}
      - MEDIA_INDEXER_TIMEOUT_S=${MEDIA_INDEXER_TIMEOUT_S:-10}
      - MEDIA_INDEXER_AUTO_SYNC_GENERATED=${MEDIA_INDEXER_AUTO_SYNC_GENERATED:-true}
      - MEDIA_INDEXER_AUTO_SCAN_MODE=${MEDIA_INDEXER_AUTO_SCAN_MODE:-metadata}
      - MEDIA_INDEXER_GENERATED_SOURCE_NAME=${MEDIA_INDEXER_GENERATED_SOURCE_NAME:-Mklan Studio Generated}
      - MEDIA_INDEXER_GENERATED_SOURCE_ROOT=${MEDIA_INDEXER_GENERATED_SOURCE_ROOT:-/data/sources/generated}
      # SillyTavern Cards defaults
      - CARDS_DATA_DIR=/app/data/cards
      - CARDS_DB=/app/data/cards/card_creator.db
      - CARDS_SILLYTAVERN_ENABLED=${CARDS_SILLYTAVERN_ENABLED:-true}
      - CARDS_SILLYTAVERN_DATA_ROOT=/sillytavern-data
      - SILLYTAVERN_PUBLIC_URL=${SILLYTAVERN_PUBLIC_URL:-http://localhost:8011}
      - SILLYTAVERN_INTERNAL_URL=http://sillytavern:8000
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  sillytavern:
    image: ghcr.io/sillytavern/sillytavern:${SILLYTAVERN_VERSION:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      FORCE_COLOR: "1"
      SILLYTAVERN_HEARTBEATINTERVAL: "30"
      SILLYTAVERN_BROWSERLAUNCH_ENABLED: "false"
      SILLYTAVERN_WHITELISTMODE: ${SILLYTAVERN_WHITELISTMODE:-true}
      SILLYTAVERN_WHITELIST: ${SILLYTAVERN_WHITELIST:-["::1","127.0.0.1","172.16.0.0/12"]}
      SILLYTAVERN_SECURITYOVERRIDE: ${SILLYTAVERN_SECURITYOVERRIDE:-false}
    ports:
      - "${SILLYTAVERN_BIND_ADDR:-127.0.0.1}:${SILLYTAVERN_PUBLIC_PORT:-8011}:8000"
    volumes:
      - sillytavern_config:/home/node/app/config
      - sillytavern_data:/home/node/app/data
      - sillytavern_plugins:/home/node/app/plugins
      - sillytavern_extensions:/home/node/app/public/scripts/extensions/third-party
    healthcheck:
      test: ["CMD", "node", "src/healthcheck.js"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

  media_db:
    image: pgvector/pgvector:pg16
    profiles: ["media-indexer"]
    restart: unless-stopped
    environment:
      POSTGRES_DB: media_indexer
      POSTGRES_USER: media_indexer
      POSTGRES_PASSWORD: ${MEDIA_INDEXER_POSTGRES_PASSWORD:-change-me}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U media_indexer -d media_indexer"]
      interval: 10s
      timeout: 5s
      retries: 10

  media_indexer_backend:
    build:
      context: ./media-indexer
      dockerfile: infra/backend.Dockerfile
    profiles: ["media-indexer"]
    restart: unless-stopped
    environment:
      APP_ENV: ${MEDIA_INDEXER_APP_ENV:-production}
      DATABASE_URL: postgresql+psycopg://media_indexer:${MEDIA_INDEXER_POSTGRES_PASSWORD:-change-me}@media_db:5432/media_indexer
      FRONTEND_ORIGIN: http://localhost:5173
      ALLOWED_SOURCE_ROOTS: /data/sources
      WINDOWS_HOST_MOUNT_ROOT: ""
      SESSION_SECRET: ${MEDIA_INDEXER_SESSION_SECRET:-change-me-in-production}
      GENERATED_SOURCE_NAME: ${MEDIA_INDEXER_GENERATED_SOURCE_NAME:-Mklan Studio Generated}
      GENERATED_SOURCE_ROOT: ${MEDIA_INDEXER_GENERATED_SOURCE_ROOT:-/data/sources/generated}
    depends_on:
      media_db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./data/generated:/data/sources/generated:ro
      - ./data/media_previews:/workspace/storage/previews
      # Add machine-specific media mounts in docker-compose.override.yml.
      # Example target path: /data/sources/photos

  media_worker:
    build:
      context: ./media-indexer
      dockerfile: infra/worker.Dockerfile
    profiles: ["media-indexer"]
    restart: unless-stopped
    environment:
      APP_ENV: ${MEDIA_INDEXER_APP_ENV:-production}
      DATABASE_URL: postgresql+psycopg://media_indexer:${MEDIA_INDEXER_POSTGRES_PASSWORD:-change-me}@media_db:5432/media_indexer
      SESSION_SECRET: ${MEDIA_INDEXER_SESSION_SECRET:-change-me-in-production}
      PREVIEW_ROOT: /workspace/storage/previews
      ALLOWED_SOURCE_ROOTS: /data/sources
      WINDOWS_HOST_MOUNT_ROOT: ""
      GENERATED_SOURCE_NAME: ${MEDIA_INDEXER_GENERATED_SOURCE_NAME:-Mklan Studio Generated}
      GENERATED_SOURCE_ROOT: ${MEDIA_INDEXER_GENERATED_SOURCE_ROOT:-/data/sources/generated}
      WORKER_POLL_INTERVAL_SECONDS: 5
      BASIC_SCAN_BATCH_SIZE: ${MEDIA_INDEXER_BASIC_SCAN_BATCH_SIZE:-1000}
      CLIP_ENABLED: "true"
      CLIP_DEVICE: "cpu"
    depends_on:
      media_db:
        condition: service_healthy
      media_indexer_backend:
        condition: service_started
    volumes:
      - ./data/generated:/data/sources/generated:ro
      - ./data/media_previews:/workspace/storage/previews
      - ./data/hf_cache:/root/.cache/huggingface
      # Mirror machine-specific media mounts from docker-compose.override.yml.
      # Example target path: /data/sources/photos

volumes:
  sillytavern_config:
  sillytavern_data:
  sillytavern_plugins:
  sillytavern_extensions:
