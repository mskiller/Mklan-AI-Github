server {
    listen 80;
    server_name _;
    resolver 127.0.0.11 valid=30s ipv6=off;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 0;  # Allow unlimited — models can be many GB
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_connect_timeout 75s;

    # Wildcard API proxy — preserve /wildcards prefix for FastAPI mount
    location /wildcards/api {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Wildcard Workshop SPA route
    location /wildcards {
        try_files $uri $uri/ /index.html;
    }

    # Movie SPA entrypoints
    location = /movie {
        try_files /index.html =404;
    }

    location = /movie/ {
        try_files /index.html =404;
    }

    # Movie backend proxy — preserve /movie prefix for FastAPI mount
    location /movie {
        error_page 418 = @backend;
        if ($http_accept !~* "text/html") {
            return 418;
        }
        try_files /index.html =404;
    }

    # SillyTavern Cards SPA entrypoints
    location = /cards {
        try_files /index.html =404;
    }

    location = /cards/ {
        try_files /index.html =404;
    }

    # SillyTavern Cards backend proxy — preserve /cards prefix for FastAPI mount
    location /cards {
        error_page 418 = @backend;
        if ($http_accept !~* "text/html") {
            return 418;
        }
        try_files /index.html =404;
    }

    # Named location for shared backend proxying
    location @backend {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Studio backend proxy — preserve /api prefix for FastAPI mount
    location /api/media/ {
        set $media_backend "media_indexer_backend:8000";
        rewrite ^/api/media/(.*)$ /$1 break;
        proxy_pass http://$media_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static generated image path serving
    location /generated/ {
        proxy_pass http://backend:8080/generated/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Disable caching for index.html SPA entrypoint
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }
}
